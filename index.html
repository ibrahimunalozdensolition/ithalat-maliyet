<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>İthalat Maliyet Hesap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222d;
      --border: #2a3544;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-dim: #2563a8;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 1.75rem;
    }
    .grid {
      display: grid;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      .grid-2 { grid-template-columns: 1fr 1fr; }
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #121820;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 156, 245, 0.2);
    }
    .kur-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .kur-row input#kur_try { max-width: 140px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      margin-bottom: 1.25rem;
    }
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin-top: 1.1rem;
    }
    button {
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-secondary {
      background: #243041;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .err {
      color: var(--danger);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin-top: 0.75rem;
    }
    .result-table th,
    .result-table td {
      text-align: left;
      padding: 0.45rem 0.65rem;
      border-bottom: 1px solid var(--border);
    }
    .result-table th { color: var(--muted); font-weight: 600; width: 55%; }
    .result-table tr:last-child td { border-bottom: none; font-weight: 700; font-size: 1.05rem; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .kar-box {
      margin-top: 1.25rem;
      border-radius: 10px;
      border: 1.5px solid #22c55e;
      background: rgba(34, 197, 94, 0.08);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .kar-box .kar-label {
      font-size: 1rem;
      font-weight: 700;
      color: #22c55e;
    }
    .kar-box .kar-val {
      font-size: 1.15rem;
      font-weight: 700;
      color: #22c55e;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .kar-box .kar-birim {
      font-size: 0.85rem;
      color: #4ade80;
      font-weight: 600;
      text-align: right;
    }
    .kar-cols { text-align: right; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>İthalat maliyet hesabı</h1>
    <p class="sub">Ürün, adet, birim maliyet (USD) ve kargo bedelini (USD) girin; gümrük ve KDV satırları aynı mantıkla hesaplanır.</p>
    <p class="hint"><strong>Sayıları Türkçe formatla girin:</strong> binlik ayraç için nokta (5.000), ondalık için virgül (1,35).</p>

    <div class="kur-row">
      <label for="kur_try" style="margin:0;">USD/TRY kur</label>
      <input id="kur_try" type="text" inputmode="decimal" autocomplete="off" placeholder="Örn: 44,81">
      <button type="button" class="btn-secondary" id="btnKurYenile">Kuru yenile</button>
    </div>

    <div class="card">
      <form id="f" class="grid grid-2" onsubmit="return false;">
        <div style="grid-column: 1 / -1;">
          <label for="urun">Ürün</label>
          <input id="urun" name="urun" type="text" placeholder="Örn. Ürün kodu veya adı" autocomplete="off">
        </div>
        <div>
          <label for="adet">Adet (birim)</label>
          <input id="adet" name="adet" type="text" inputmode="decimal" placeholder="Örn: 3.024 veya 5000">
        </div>
        <div>
          <label for="mal_birim_usd">Mal bedeli birim (USD)</label>
          <input id="mal_birim_usd" name="mal_birim_usd" type="text" inputmode="decimal" placeholder="Örn: 1,35 veya 2,50">
        </div>
        <div>
          <label for="kargo_usd">Kargo bedeli toplam (USD)</label>
          <input id="kargo_usd" name="kargo_usd" type="text" inputmode="decimal" placeholder="Örn: 3.417,12">
        </div>
        <div>
          <label for="yurtici_usd">Yurtiçi giderler (USD)</label>
          <input id="yurtici_usd" name="yurtici_usd" type="text" inputmode="decimal" value="200">
        </div>
        <div>
          <label for="damga_usd">Damga (USD)</label>
          <input id="damga_usd" name="damga_usd" type="text" inputmode="decimal" value="37">
        </div>
        <div>
          <label for="musavir_tl">Gümrük müşavir parası (TL)</label>
          <input id="musavir_tl" name="musavir_tl" type="text" inputmode="decimal" value="0">
        </div>
        <div>
          <label for="satis_fiyati_tl">Satış fiyatı birim (TL)</label>
          <input id="satis_fiyati_tl" name="satis_fiyati_tl" type="text" inputmode="decimal" placeholder="Örn: 250,00">
        </div>
      </form>
      <div class="row-actions">
        <button type="button" class="btn-primary" id="btnHesapla">Hesapla</button>
      </div>
      <div class="err" id="err" hidden></div>
    </div>

    <div class="card" id="sonucCard" hidden>
      <table class="result-table" id="sonucTablo">
        <tbody></tbody>
      </table>
      <div class="kar-box" id="karBox" hidden>
        <div class="kar-label">Toplam kazanılacak kâr</div>
        <div class="kar-cols">
          <div class="kar-val" id="karToplam"></div>
          <div class="kar-birim" id="karBirim"></div>
        </div>
      </div>
    </div>

  </div>
  <script>
(function () {
  var G1 = 0.037;
  var G2 = 0.23;
  var KDV = 0.20;

  function parseNum(s) {
    if (s == null || String(s).trim() === "") return NaN;
    var t = String(s).trim().replace(/\s/g, "");
    
    if (t.indexOf(",") >= 0 && t.indexOf(".") >= 0) {
      t = t.replace(/\./g, "").replace(",", ".");
    } else if (t.indexOf(",") >= 0) {
      t = t.replace(/\./g, "").replace(",", ".");
    } else if (t.indexOf(".") >= 0) {
      var dotCount = (t.match(/\./g) || []).length;
      if (dotCount > 1) {
        t = t.replace(/\./g, "");
      } else {
        var dotParts = t.split(".");
        if (dotParts.length === 2 && dotParts[1].length === 3 && dotParts[0].length <= 3) {
          t = t.replace(".", "");
        }
      }
    }
    return parseFloat(t);
  }

  function fmtTR(n, frac) {
    if (typeof n !== "number" || isNaN(n)) return "—";
    return n.toLocaleString("tr-TR", { minimumFractionDigits: frac, maximumFractionDigits: frac });
  }

  function roundN(x, d) {
    var p = Math.pow(10, d);
    return Math.round(x * p) / p;
  }

  function hesapla(adet, malBirim, kargo, yurtici, damga, musavir_usd) {
    var ham = adet * malBirim;
    var cif = ham + kargo;
    var g1 = cif * G1;
    var g2 = cif * G2;
    var kdvMatrah = cif + g1 + yurtici;
    var kdv = kdvMatrah * KDV;
    var toplamVergi = g1 + g2 + kdv + damga;
    var toplamMaliyet = cif + yurtici + g1 + g2 + kdv + damga + musavir_usd;
    var birim = adet ? toplamMaliyet / adet : 0;
    return {
      ham_usd: roundN(ham, 2),
      cif_usd: roundN(cif, 2),
      gumruk_yuzde_3_7_usd: roundN(g1, 2),
      ilave_gumruk_yuzde_23_usd: roundN(g2, 2),
      yurtici_usd: roundN(yurtici, 2),
      kdv_matrah_usd: roundN(kdvMatrah, 2),
      kdv_yuzde_20_usd: roundN(kdv, 2),
      damga_usd: roundN(damga, 2),
      musavir_usd: roundN(musavir_usd, 2),
      toplam_vergi_usd: roundN(toplamVergi, 2),
      toplam_maliyet_usd: roundN(toplamMaliyet, 2),
      birim_maliyet_usd: roundN(birim, 4)
    };
  }

  function tlEkle(detay, kur, musavir_tl) {
    detay.usd_try = roundN(kur, 4);
    detay.ham_tl = roundN(detay.ham_usd * kur, 2);
    detay.musavir_tl = roundN(musavir_tl, 2);
    detay.toplam_maliyet_tl = roundN(detay.toplam_maliyet_usd * kur, 2);
    detay.birim_maliyet_tl = roundN(detay.birim_maliyet_usd * kur, 2);
    return detay;
  }

  function mevcutKur() {
    var k = parseNum(document.getElementById("kur_try").value);
    if (isNaN(k) || k <= 0) return NaN;
    return k;
  }

  async function loadKur() {
    var el = document.getElementById("kur_try");
    var k = null;
    
    var apis = [
      "https://open.er-api.com/v6/latest/USD",
      "https://api.exchangerate-api.com/v4/latest/USD"
    ];
    
    for (var i = 0; i < apis.length; i++) {
      try {
        var r = await fetch(apis[i], {
          method: 'GET',
          mode: 'cors'
        });
        if (r.ok) {
          var j = await r.json();
          k = j.rates && j.rates.TRY;
          if (k != null && !isNaN(k) && k > 0) {
            console.log("Kur başarıyla çekildi: " + k + " (API " + (i + 1) + ")");
            break;
          }
        }
      } catch (e) {
        console.warn("API " + (i + 1) + " hatası:", e.message);
      }
    }
    
    if (k == null || isNaN(k) || k <= 0) {
      console.warn("API'lerden kur çekilemedi, manuel girin veya varsayılan kullanın");
      k = 44.81;
    }
    el.value = fmtTR(k, 4);
  }

  function sonucGoster(j) {
    var tb = document.querySelector("#sonucTablo tbody");
    tb.innerHTML = "";
    var rows = [
      ["Ürünün ham bedeli (USD)", j.ham_usd],
      ["CIF (mal + kargo) (USD)", j.cif_usd],
      ["Gümrük %3,7 (USD)", j.gumruk_yuzde_3_7_usd],
      ["İlave gümrük %23 (USD)", j.ilave_gumruk_yuzde_23_usd],
      ["Yurtiçi giderler (USD)", j.yurtici_usd],
      ["KDV matrahı (USD)", j.kdv_matrah_usd],
      ["KDV %20 (USD)", j.kdv_yuzde_20_usd],
      ["Damga (USD)", j.damga_usd],
      ["Gümrük müşavir parası (USD)", j.musavir_usd],
      ["Gümrük müşavir parası (TL)", j.musavir_tl],
      ["Gümrüğe ödenecek toplam vergi (USD)", j.toplam_vergi_usd],
      ["Toplam maliyet (USD)", j.toplam_maliyet_usd],
      ["Birim maliyet (USD)", j.birim_maliyet_usd],
      ["Ham bedel (TL)", j.ham_tl],
      ["Birim maliyet (TL)", j.birim_maliyet_tl],
      ["Toplam maliyet (TL)", j.toplam_maliyet_tl]
    ];
    rows.forEach(function (row, i) {
      var tr = document.createElement("tr");
      var td1 = document.createElement("td");
      td1.textContent = row[0];
      var td2 = document.createElement("td");
      td2.className = "num";
      var b = row[1];
      td2.textContent = typeof b === "number" ? fmtTR(b, i === 12 ? 4 : 2) : b;
      tr.appendChild(td1);
      tr.appendChild(td2);
      tb.appendChild(tr);
    });
    document.getElementById("sonucCard").hidden = false;
  }

  function formOku() {
    return {
      adet: parseNum(document.getElementById("adet").value),
      mal_birim_usd: parseNum(document.getElementById("mal_birim_usd").value),
      kargo_usd: parseNum(document.getElementById("kargo_usd").value),
      yurtici_usd: parseNum(document.getElementById("yurtici_usd").value),
      damga_usd: parseNum(document.getElementById("damga_usd").value),
      musavir_tl: parseNum(document.getElementById("musavir_tl").value),
      satis_fiyati_tl: parseNum(document.getElementById("satis_fiyati_tl").value)
    };
  }

  function karGoster(detay, adet, satisBirimTl) {
    var box = document.getElementById("karBox");
    if (isNaN(satisBirimTl) || satisBirimTl <= 0) {
      box.hidden = true;
      return;
    }
    var satisToplamTl = satisBirimTl * adet;
    var karToplamTl = roundN(satisToplamTl - detay.toplam_maliyet_tl, 2);
    var karBirimTl = roundN(satisBirimTl - detay.birim_maliyet_tl, 2);
    document.getElementById("karToplam").textContent = fmtTR(karToplamTl, 2) + " TL";
    document.getElementById("karBirim").textContent = "Birim kâr: " + fmtTR(karBirimTl, 2) + " TL";
    box.hidden = false;
  }

  function hesaplaVeGoster() {
    var err = document.getElementById("err");
    err.hidden = true;
    var kur = mevcutKur();
    if (isNaN(kur)) {
      err.textContent = "Geçerli bir USD/TRY kuru girin veya Kuru yenile.";
      err.hidden = false;
      return null;
    }
    var b = formOku();
    
    console.log("=== DEBUG: Parse edilen değerler ===");
    console.log("Kur:", kur);
    console.log("Adet:", b.adet);
    console.log("Mal birim USD:", b.mal_birim_usd);
    console.log("Kargo USD:", b.kargo_usd);
    console.log("Yurtiçi USD:", b.yurtici_usd);
    console.log("Damga USD:", b.damga_usd);
    console.log("Müşavir TL:", b.musavir_tl);
    
    if (b.adet <= 0 || isNaN(b.adet)) {
      err.textContent = "Adet pozitif bir sayı olmalı.";
      err.hidden = false;
      return null;
    }
    if (isNaN(b.mal_birim_usd) || b.mal_birim_usd < 0 || isNaN(b.kargo_usd) || b.kargo_usd < 0 ||
        isNaN(b.yurtici_usd) || b.yurtici_usd < 0 || isNaN(b.damga_usd) || b.damga_usd < 0 ||
        isNaN(b.musavir_tl) || b.musavir_tl < 0) {
      err.textContent = "Tüm tutarlar geçerli sayılar olmalı.";
      err.hidden = false;
      return null;
    }
    var musavir_usd = b.musavir_tl / kur;
    var detay = hesapla(b.adet, b.mal_birim_usd, b.kargo_usd, b.yurtici_usd, b.damga_usd, musavir_usd);
    tlEkle(detay, kur, b.musavir_tl);
    sonucGoster(detay);
    karGoster(detay, b.adet, b.satis_fiyati_tl);
    return detay;
  }


  document.getElementById("btnHesapla").addEventListener("click", function () {
    hesaplaVeGoster();
  });

  document.getElementById("btnKurYenile").addEventListener("click", function () {
    loadKur();
  });

  loadKur();
})();
  </script>
</body>
</html>
